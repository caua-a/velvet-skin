<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/pagina_produtoDN.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=sunny" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=dark_mode" />
    <title>Produtos Diurnos e Noturnos</title>
</head>
<body>

    <main class="produtos-container">
        
        <section class="secao-diurna">
            <div class="titulo-secao">
                <span class="material-symbols-outlined">sunny</span>
                <h1>PRODUTOS DIURNOS</h1>
            </div>

            <div class="lista-produtos">
                <article class="produto-card">
                    <img src="../img/gel de limpeza facial.png" alt="Gel de Limpeza Facial">
                    <h2>Gel de Limpeza Facial</h2>
                    <p class="preco">R$ 89,90</p>
                    <button class="btn-ver-mais">VER MAIS</button>
                </article>

                <article class="produto-card">
                    <img src="../img/serum facial branco.png" alt="Sérum Vitamina C">
                    <h2>Sérum Vitamina C</h2>
                    <p class="preco">R$ 129,90</p>
                    <button class="btn-ver-mais">VER MAIS</button>
                </article>

                <article class="produto-card">
                    <img src="../img/creme hidratante bebe.png" alt="Hidratante Facial">
                    <h2>Hidratante Facial</h2>
                    <p class="preco">R$ 149,90</p>
                    <button class="btn-ver-mais">VER MAIS</button>
                </article>

                <article class="produto-card">
                    <img src="../img/protetor solar.png" alt="Protetor Solar">
                    <h2>Protetor Solar FPS 50</h2>
                    <p class="preco">R$ 99,90</p>
                    <button class="btn-ver-mais">VER MAIS</button>
                </article>
            </div>
        </section>

        <section class="secao-noturna">
            <div class="titulo-secao">
                <span class="material-symbols-outlined">
dark_mode
</span>
                <h1>PRODUTOS NOTURNOS</h1>
            </div>

            <div class="lista-produtos">
                <article class="produto-card">
                    <img src="../img/serum retinol noturno.png" alt="Sérum Retinol">
                    <h2>Sérum Retinol</h2>
                    <p class="preco">R$ 159,90</p>
                    <button class="btn-ver-mais">VER MAIS</button>
                </article>

                <article class="produto-card">
                    <img src="../img/argila noturn.jpg" alt="Creme Noturno">
                    <h2>Creme Noturno</h2>
                    <p class="preco">R$ 139,90</p>
                    <button class="btn-ver-mais">VER MAIS</button>
                </article>

                <article class="produto-card">
                    <img src="../img/oleo facial nutritivo.png" alt="Óleo Facial">
                    <h2>Óleo Facial</h2>
                    <p class="preco">R$ 119,90</p>
                    <button class="btn-ver-mais">VER MAIS</button>
                </article>

                <article class="produto-card">
                    <img src="../img/argiloa.png" alt="Máscara de Argila">
                    <h2>Máscara de Argila</h2>
                    <p class="preco">R$ 89,90</p>
                    <button class="btn-ver-mais">VER MAIS</button>
                </article>
            </div>
        </section>

    </main>

</body>
</html>
