<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Skin - Meu Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-creme: #faf8f5;
            --verde-oliva: #2d3b26;
            --verde-claro: #42553a;
            --texto-escuro: #222222;
            --texto-mutado: #777777;
            --borda: #e5e0da;
            --dourado: #c5a880;
            --branco: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-creme);
            color: var(--texto-escuro);
            font-size: 14px;
            line-height: 1.6;
        }

        /* Header idêntico ao topo do layout */
        header {
            background-color: var(--branco);
            border-bottom: 1px solid var(--borda);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--verde-oliva);
            text-decoration: none;
        }

        nav a {
            color: var(--texto-escuro);
            text-decoration: none;
            margin: 0 15px;
            font-size: 13px;
            font-weight: 500;
        }

        nav a:hover, nav a.active {
            color: var(--verde-oliva);
            font-weight: 600;
        }

        /* Container Principal em duas colunas */
        .main-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }

        /* Coluna Esquerda: Menu do Usuário & Skin Score */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .profile-card, .skin-score-box {
            background: var(--branco);
            border: 1px solid var(--borda);
            border-radius: 4px;
            padding: 25px;
            text-align: center;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background-color: var(--borda);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--verde-oliva);
        }

        .profile-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            color: var(--verde-oliva);
            margin-bottom: 5px;
        }

        .profile-card p {
            color: var(--texto-mutado);
            font-size: 12px;
            margin-bottom: 20px;
        }

        .side-menu {
            list-style: none;
            text-align: left;
            border-top: 1px solid var(--borda);
            padding-top: 15px;
        }

        .side-menu li a {
            display: block;
            padding: 10px 0;
            color: var(--texto-escuro);
            text-decoration: none;
            font-size: 13px;
            transition: 0.2s;
        }

        .side-menu li a:hover, .side-menu li.active a {
            color: var(--verde-oliva);
            font-weight: 600;
            padding-left: 5px;
        }

        /* Bloco do Skin Score baseado no layout */
        .skin-score-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--texto-mutado);
            margin-bottom: 10px;
        }

        .score-number {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            color: var(--verde-oliva);
            line-height: 1;
        }

        .score-number span {
            font-size: 16px;
            color: var(--texto-mutado);
        }

        .score-status {
            color: var(--verde-claro);
            font-weight: 600;
            font-size: 13px;
            margin: 5px 0 15px;
        }

        /* Coluna Direita: Conteúdo Dinâmico */
        .content-area {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .section-box {
            background: var(--branco);
            border: 1px solid var(--borda);
            border-radius: 4px;
            padding: 30px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--verde-oliva);
            margin-bottom: 20px;
            border-bottom: 1px solid var(--borda);
            padding-bottom: 10px;
        }

        /* Formulários estilo Velvet Skin */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 12px;
            font-weight: 500;
            color: var(--texto-escuro);
        }

        input {
            padding: 12px;
            border: 1px solid var(--borda);
            background-color: var(--bg-creme);
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            border-radius: 4px;
            outline: none;
        }

        input:focus {
            border-color: var(--verde-oliva);
        }

        /* Botão Verde Oliva Principal */
        .btn-primary {
            background-color: var(--verde-oliva);
            color: var(--branco);
            border: none;
            padding: 12px 25px;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            align-self: flex-start;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .btn-primary:hover {
            background-color: var(--verde-claro);
        }

        /* Métricas de Pele com Barras */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .metric-item {
            margin-bottom: 10px;
        }

        .metric-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .metric-bar-bg {
            background: #eee;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }

        .metric-bar-fill {
            background: var(--verde-oliva);
            height: 100%;
        }

        /* Histórico de Pedidos */
        .order-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 13px;
        }

        .order-table th, .order-table td {
            padding: 12px;
            border-bottom: 1px solid var(--borda);
        }

        .order-table th {
            font-weight: 600;
            color: var(--verde-oliva);
            background-color: var(--bg-creme);
        }

        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-entregue { background: #e2f0d9; color: #385723; }
        .status-processando { background: #fff2cc; color: #7f6000; }

        @media (max-width: 768px) {
            .main-container { grid-template-columns: 1fr; }
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
            .metrics-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>



    <div class="main-container">
        <div class="sidebar">
            <div class="profile-card">
                <div class="avatar">M</div>
                <h3>Mariana Silva</h3>
                <p>mariana.silva@email.com</p>
                
                <ul class="side-menu">
                    <li class="active"><a href="#">Meu Perfil</a></li>
                    <li><a href="#">Meus Diagnósticos</a></li>
                    <li><a href="#">Histórico de Pedidos</a></li>
                    <li><a href="#">Sair</a></li>
                </ul>
            </div>

            <div class="skin-score-box">
                <p class="skin-score-title">Seu Skin Score</p>
                <div class="score-number">82<span>/100</span></div>
                <p class="score-status">Muito bom! ✨</p>
                
                <div class="metric-item">
                    <div class="metric-info"><span>Oleosidade</span><span>72%</span></div>
                    <div class="metric-bar-bg"><div class="metric-bar-fill" style="width: 72%;"></div></div>
                </div>
                <div class="metric-item">
                    <div class="metric-info"><span>Hidratação</span><span>85%</span></div>
                    <div class="metric-bar-bg"><div class="metric-bar-fill" style="width: 85%;"></div></div>
                </div>
                <div class="metric-item">
                    <div class="metric-info"><span>Textura</span><span>80%</span></div>
                    <div class="metric-bar-bg"><div class="metric-bar-fill" style="width: 80%;"></div></div>
                </div>
            </div>
        </div>

        <div class="content-area">
            <div class="section-box">
                <h2 class="section-title">Dados Cadastrais</h2>
                {% for dado in dados %}
                <form class="form-grid">
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" value="{{dado.usuario}}">
                    </div>
                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" value="{{dado.email}}">
                    </div>
                    <div class="form-group">
                        <label>Telefone</label>
                        <input type="text" value="{{dado.telefone}}">
                    </div>
                    <div class="form-group">
                        <label>Tipo de Pele (Relatado)</label>
                        <input type="text" value="Mista a Sensível" disabled>
                    </div>
                    <div class="form-group full-width">
                        <label>Endereço de Entrega</label>
                        <input type="text" value="{{dado.endereco}}">
                    </div>
                    <button type="button" class="btn-primary">Salvar Alterações</button>
                </form>
                {% endfor %}
            </div>

            <div class="section-box">
                <h2 class="section-title">Últimos Pedidos</h2>
                <table class="order-table">
                    <thead>
                        <tr>
                            <th>Pedido</th>
                            <th>Data</th>
                            <th>Produtos</th>
                            <th>Total</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                     
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
