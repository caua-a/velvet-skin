<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/pagina_catalogo.css">
    <title>Catálogo de Produtos</title>
</head>
<body>

    <header class="topo-catalogo">
        <h1>Catálogo</h1>
        <div class="filtros-rapidos">
            <button class="btn-filtro ativo">Todos</button>
            <button class="btn-filtro">Diurnos ☀️</button>
            <button class="btn-filtro">Noturnos 🌙</button>
        </div>
    </header>

    <main class="conteudo-principal">

        <aside class="barra-lateral">
            <div class="grupo-filtro">
                <h3>Categorias</h3>
                <ul>
                    <li><label><input type="radio" name="categoria"> Limpeza</label></li>
                    <li><label><input type="radio" name="categoria"> Hidratação</label></li>
                    <li><label><input type="radio" name="categoria"> Séruns</label></li>
                    <li><label><input type="radio" name="categoria"> Tratamentos</label></li>
                    <li><label><input type="radio" name="categoria"> Protetor Solar</label></li>
                    <li><label><input type="radio" name="categoria"> Máscaras</label></li>
                    <li><label><input type="radio" name="categoria"> Kits</label></li>
                </ul>
            </div>

            <div class="grupo-filtro">
                <h3>Faixa de preço</h3>
                <input type="range" min="0" max="500" value="500" class="seletor-preco">
                <div class="valores-preco">
                    <span>R$ 0</span>
                    <span>R$ 500</span>
                </div>
            </div>

            <button class="btn-filtrar-lateral">FILTRAR</button>
        </aside>

        <section class="grade-produtos">
            
            <article class="produto-card">
                <span class="icone-tempo">☀️</span>
                <img src="../img/gel de limpeza facial.png" alt="Gel de Limpeza">
                <h2>Gel de Limpeza</h2>
                <p class="preco">R$ 89,90</p>
                <button class="btn-ver-mais">VER MAIS</button>
            </article>

            <article class="produto-card">
                <span class="icone-tempo">🌙</span>
                <img src="../img/serum retinol noturno.png" alt="Sérum Vitamina C">
                <h2>Sérum Vitamina C</h2>
                <p class="preco">R$ 129,90</p>
                <button class="btn-ver-mais">VER MAIS</button>
            </article>

            <article class="produto-card">
                <span class="icone-tempo">☀️</span>
                <img src="../img/creme hidratante bebe.png" alt="Hidratante Facial">
                <h2>Hidratante Facial</h2>
                <p class="preco">R$ 149,90</p>
                <button class="btn-ver-mais">VER MAIS</button>
            </article>

            <article class="produto-card">
                <span class="icone-tempo">☀️</span>
                <img src="../img/protetor solar.png" alt="Protetor Solar FPS 50">
                <h2>Protetor Solar FPS 50</h2>
                <p class="preco">R$ 99,90</p>
                <button class="btn-ver-mais">VER MAIS</button>
            </article>

            <article class="produto-card">
                <span class="icone-tempo">🌙</span>
                <img src="../img/seru normal.jpg" alt="Bruma Facial">
                <h2>Sérum para olheiras</h2>
                <p class="preco">R$ 69,90</p>
                <button class="btn-ver-mais">VER MAIS</button>
            </article>

            <article class="produto-card">
                <span class="icone-tempo">🌙</span>
                <img src="../img/argila noturn.jpg" alt="Gel Creme Antioxidante">
                <h2>Argila em Creme</h2>
                <p class="preco">R$ 139,90</p>
                <button class="btn-ver-mais">VER MAIS</button>
            </article>

        </section>

    </main>

    <div class="rodape-acao">
        <button class="btn-noturnos-rodape">VER PRODUTOS NOTURNOS 🌙</button>
    </div>

</body>
</html>
