{% extends 'layout.html' %}
{% block conteudo %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/pagina_login.css">
    <title>Login</title>
</head>

<body>

    <form class="login" action="/login/logar" method="post">

        <h1>Login</h1>



        <label class="label" for="usuario">
            Usuario
        </label>

        <input class="input" type="text" id="usuario" name="usuariologin" placeholder="Digite seu usuário">





        <label class="label" for="senha">
            Senha
        </label>

        <input class="input" type="password" id="senha" name="senhalogin" placeholder="Digite sua senha">


        <p class="esqueceu-senha">
            Esqueceu sua senha?
        </p>

        <button class="botao-cadastrar" type="submit">
            ENTRAR
        </button>

        <p class="cadastro-link">
            Não tem uma conta?
            <a href="cadastro.html">
                Cadastre-se
            </a>
        </p>

        <a href="recuperar_senha.html" class="esqueceu-senha">
            Esqueceu sua senha?
        </a>

    </form>

</body>

</html>
{% endblock %}
